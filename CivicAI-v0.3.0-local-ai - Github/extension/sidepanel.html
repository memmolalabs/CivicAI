<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CivicAI</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-mark">C</div>
    <div>
      <h1>CivicAI</h1>
      <p data-i18n="tagline"></p>
    </div>
  </header>

  <main>
    <section class="card intro">
      <span class="eyebrow" data-i18n="selectedText"></span>
      <textarea id="sourceText" rows="6" data-i18n-placeholder="sourcePlaceholder"></textarea>
      <div id="sourceMeta" class="source-meta"></div>
      <div class="button-row">
        <button id="analyzeButton" class="primary" data-i18n="analyze"></button>
        <button id="demoButton" class="secondary" data-i18n="loadExample"></button>
      </div>
    </section>

    <section id="statusCard" class="card status hidden" aria-live="polite"></section>

    <section id="resultSection" class="hidden">
      <div class="result-heading">
        <div>
          <span class="eyebrow" data-i18n="editableResult"></span>
          <h2 data-i18n="civicReport"></h2>
        </div>
        <span id="confidenceBadge" class="badge"></span>
      </div>

      <section class="card">
        <label><span data-i18n="category"></span>
          <input id="category" type="text">
        </label>
        <label><span data-i18n="subject"></span>
          <input id="subject" type="text">
        </label>
        <div class="two-columns">
          <label><span data-i18n="location"></span>
            <input id="location" type="text">
          </label>
          <label><span data-i18n="urgency"></span>
            <select id="urgency">
              <option value="low" data-i18n="urgencyLow"></option>
              <option value="medium" data-i18n="urgencyMedium"></option>
              <option value="high" data-i18n="urgencyHigh"></option>
              <option value="critical" data-i18n="urgencyCritical"></option>
            </select>
          </label>
        </div>
        <label><span data-i18n="recipient"></span>
          <input id="recipient" type="text">
        </label>
        <label><span data-i18n="urgencyReason"></span>
          <textarea id="urgencyReason" rows="3"></textarea>
        </label>
        <label><span data-i18n="missingInfo"></span>
          <textarea id="missingInfo" rows="3"></textarea>
        </label>
        <label><span data-i18n="reportText"></span>
          <textarea id="reportDraft" rows="12"></textarea>
        </label>
        <div class="button-row">
          <button id="copyButton" class="primary" data-i18n="copyReport"></button>
          <button id="resetButton" class="secondary" data-i18n="reset"></button>
        </div>
      </section>

      <p class="privacy-note" data-i18n="privacyNote"></p>
    </section>
  </main>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
